spring.application.name=yaquedo-backend
server.port=${PORT:8080}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/yaquedo}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# JWT
jwt.secret=${JWT_SECRET:eWFxdWVkb1NlY3JldEtleVBhcmFKV1QyMDI1WWFRdWVkb1RldHJhZGV2U2VjcmV0S2V5Mzg0Yml0c0xvbmdFbm91Z2hGb3JIUzUxMkFsZ29yaXRobSE=}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173,http://127.0.0.1:4200,http://127.0.0.1:5173}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# OpenAI (reserved for Sprint 4 - add spring-ai-openai-spring-boot-starter when needed)
# spring.ai.openai.api-key=${OPENAI_API_KEY:}

# Logging
logging.level.com.yaquedo=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
