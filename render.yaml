services:
  - type: web
    name: yaquedo-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/yaquedo-backend-1.0.0.jar
    envVars:
      - key: PORT
        value: 8080
      - key: JAVA_VERSION
        value: 21
      - key: DATABASE_URL
        fromDatabase:
          name: yaquedo-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: yaquedo-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: yaquedo-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ya-quedo.vercel.app,https://ya-quedo-angular.vercel.app

databases:
  - name: yaquedo-db
    plan: free
    databaseName: yaquedo
    user: yaquedo_user
