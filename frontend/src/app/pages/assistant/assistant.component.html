<div class="min-h-[calc(100vh-4rem)] bg-gray-50 py-10">
  <div class="max-w-4xl mx-auto px-4 sm:px-6">
    <!-- Header -->
    <div class="text-center mb-8 animate-fade-up">
      <div class="eyebrow !bg-indigo-50 !text-indigo-700 mb-5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
        </svg>
        Asistente inteligente
      </div>
      <h1 class="heading-md mb-3">
        Encuentra al técnico perfecto conversando
      </h1>
      <p class="text-gray-500 max-w-2xl mx-auto leading-relaxed">
        Cuéntame qué necesitas en lenguaje natural y te recomendaré
        los mejores técnicos disponibles para tu caso.
      </p>
    </div>

    <!-- Chat Card -->
    <div class="bg-white rounded-3xl shadow-card border border-gray-100 overflow-hidden flex flex-col animate-fade-up" style="height: calc(100vh - 17rem); min-height: 28rem;">
      <!-- Chat Body -->
      <div #chatBody class="flex-1 overflow-y-auto px-6 sm:px-10 py-8 space-y-6">
        <div
          *ngFor="let m of messages()"
          [class]="'flex gap-3 animate-fade-up ' + (m.from === 'user' ? 'justify-end' : 'justify-start')"
        >
          <!-- Avatar bot -->
          <div *ngIf="m.from === 'bot'" class="w-9 h-9 flex-shrink-0 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-soft" aria-hidden="true">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
            </svg>
          </div>

          <div
            [class]="
              'max-w-[78%] px-5 py-3.5 text-sm leading-relaxed whitespace-pre-wrap ' +
              (m.from === 'user'
                ? 'bg-blue-600 text-white rounded-3xl rounded-br-lg shadow-soft'
                : m.error
                ? 'bg-red-50 border border-red-100 text-red-800 rounded-3xl rounded-bl-lg'
                : 'bg-gray-50 border border-gray-100 text-gray-900 rounded-3xl rounded-bl-lg')
            "
          >{{ m.text }}</div>
        </div>

        <!-- Indicador escribiendo -->
        <div *ngIf="sending()" class="flex gap-3 justify-start animate-fade-in">
          <div class="w-9 h-9 flex-shrink-0 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-soft animate-pulse" aria-hidden="true">
            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
            </svg>
          </div>
          <div class="bg-gray-50 border border-gray-100 rounded-3xl rounded-bl-lg px-5 py-4 flex items-center gap-3">
            <div class="flex gap-1.5">
              <span class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
              <span class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
              <span class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
            </div>
            <span class="text-xs text-gray-400">Buscando técnicos disponibles...</span>
          </div>
        </div>
      </div>

      <!-- Suggestions (solo al inicio) -->
      <div *ngIf="messages().length === 1" class="px-6 sm:px-10 py-5 border-t border-gray-100 bg-white">
        <p class="caption mb-3">Prueba con</p>
        <div class="grid sm:grid-cols-2 gap-2.5">
          <button
            *ngFor="let s of suggestions"
            type="button"
            (click)="send(s)"
            class="text-xs text-left px-4 py-3 rounded-xl bg-gray-50 hover:bg-indigo-50 hover:text-indigo-800 text-gray-600 border border-gray-100 hover:border-indigo-100 transition-all duration-200 leading-relaxed focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-600/15"
          >
            {{ s }}
          </button>
        </div>
      </div>

      <!-- Input -->
      <div class="border-t border-gray-100 bg-white px-6 sm:px-10 py-5">
        <div class="flex items-end gap-3 bg-gray-50 border border-gray-200 rounded-2xl p-2 pl-5 transition-all duration-200 focus-within:border-indigo-300 focus-within:ring-4 focus-within:ring-indigo-600/10 focus-within:bg-white">
          <textarea
            [(ngModel)]="draft"
            (keydown)="onKey($event)"
            [disabled]="sending()"
            rows="1"
            class="flex-1 bg-transparent border-0 py-2.5 focus:outline-none focus:ring-0 text-sm resize-none placeholder-gray-400 disabled:text-gray-400"
            placeholder="Escribe tu necesidad..."
            aria-label="Mensaje para el asistente"
          ></textarea>
          <button
            type="button"
            (click)="send()"
            [disabled]="sending() || !draft.trim()"
            aria-label="Enviar mensaje"
            class="w-10 h-10 flex-shrink-0 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 text-white rounded-xl transition-all duration-200 flex items-center justify-center shadow-soft focus:outline-none focus-visible:ring-4 focus-visible:ring-blue-600/20"
          >
            <svg *ngIf="!sending()" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
            </svg>
            <span *ngIf="sending()" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
          </button>
        </div>
        <div class="flex items-center justify-between mt-3 text-xs text-gray-400">
          <span>Enter para enviar · Shift+Enter para nueva línea</span>
          <button
            type="button"
            (click)="reset()"
            class="text-indigo-600 hover:text-indigo-800 font-semibold transition-colors"
          >
            Limpiar chat
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
